name: Fork Sync

on:
  schedule:
    - cron: "0 */3 * * *"   # 每 3 小时执行一次
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  sync_with_upstream:
    name: Sync with Upstream
    runs-on: ubuntu-latest
    if: ${{ github.event.repository.fork }}

    steps:
      - name: Validate SYNC_PAT
        env:
          SYNC_PAT: ${{ secrets.SYNC_PAT }}
        run: |
          set -e
          if [ -z "${SYNC_PAT:-}" ]; then
            echo "❌ SYNC_PAT 未配置。"
            echo "此工作流会在上游 main 之上保留当前仓库的 fork-sync.yml，"
            echo "因此必须使用具备 repo + workflow 权限的 PAT 推送。"
            exit 1
          fi

      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}
          fetch-depth: 0
          ref: main

      - name: Mirror upstream main
        env:
          SYNC_PAT: ${{ secrets.SYNC_PAT }}
        run: |
          set -euo pipefail

          CONTROL_WORKFLOW=".github/workflows/fork-sync.yml"
          LOCAL_WORKFLOW_BACKUP="$(mktemp)"

          git config user.name "GitHub Actions Bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # upstream remote：存在则改 URL，不存在则新增
          if git remote get-url upstream >/dev/null 2>&1; then
            git remote set-url upstream https://github.com/imzyb/MiSub.git
          else
            git remote add upstream https://github.com/imzyb/MiSub.git
          fi

          git remote set-url origin "https://x-access-token:${SYNC_PAT}@github.com/${{ github.repository }}.git"

          git fetch --prune origin
          git fetch --prune upstream

          git checkout -B main origin/main

          if git show "origin/main:${CONTROL_WORKFLOW}" > "${LOCAL_WORKFLOW_BACKUP}" 2>/dev/null; then
            echo "✅ 已备份当前仓库的同步工作流"
          else
            echo "❌ 无法从 origin/main 读取 ${CONTROL_WORKFLOW}"
            exit 1
          fi

          git reset --hard upstream/main

          mkdir -p "$(dirname "${CONTROL_WORKFLOW}")"
          cp "${LOCAL_WORKFLOW_BACKUP}" "${CONTROL_WORKFLOW}"
          git add "${CONTROL_WORKFLOW}"
          rm -f "${LOCAL_WORKFLOW_BACKUP}"

          DESIRED_TREE="$(git write-tree)"
          ORIGIN_TREE="$(git rev-parse origin/main^{tree})"
          ORIGIN_PARENT="$(git rev-parse origin/main^ 2>/dev/null || true)"
          UPSTREAM_HEAD="$(git rev-parse upstream/main)"

          if [ "${DESIRED_TREE}" = "${ORIGIN_TREE}" ] && [ "${ORIGIN_PARENT}" = "${UPSTREAM_HEAD}" ]; then
            echo "✨ 当前已是目标状态，无需推送。"
            exit 0
          fi

          git commit -m "Keep fork main mirrored to upstream" \
            -m "Replace merge-based fork syncing with reset-plus-force-push so upstream rewrites do not accumulate extra merge commits on the fork." \
            -m "Constraint: The scheduled sync workflow must live in this fork, so fork-sync.yml is intentionally preserved on top of upstream/main." \
            -m "Rejected: merge upstream/main | leaves the fork permanently ahead after upstream force-push or rollback" \
            -m "Rejected: mirror .github/workflows exactly | would overwrite the control workflow and stop future scheduled syncs" \
            -m "Confidence: high" \
            -m "Scope-risk: moderate" \
            -m "Reversibility: clean" \
            -m "Directive: Treat main as a mirror branch; keep custom development off main or it will be overwritten by sync." \
            -m "Tested: git diff against origin/main and upstream/main in workflow logic" \
            -m "Not-tested: live GitHub Actions run in this commit context"

          echo "🚀 正在强制推送 main，使其贴齐 upstream/main 并保留同步工作流..."
          git push --force-with-lease origin main
